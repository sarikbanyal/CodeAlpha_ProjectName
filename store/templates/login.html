<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - MyStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .auth-card { background: white; padding: 50px 40px; border-radius: 24px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        h2 { margin-bottom: 30px; color: #111827; font-size: 2.2rem; font-weight: 700; }
        p { text-align: left; margin-bottom: 15px; color: #4b5563; font-weight: 500; }
        input { width: 100%; padding: 14px 16px; margin-top: 5px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.3s; font-family: inherit; }
        input:focus { border-color: #3b82f6; }
        button { width: 100%; background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 16px; font-size: 1.1rem; font-weight: 600; border-radius: 12px; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(16, 185, 129, 0.4); }
        .back-link { display: inline-block; margin-top: 25px; color: #6b7280; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .back-link:hover { color: #3b82f6; }
        .help-text { font-size: 0.9rem; color: #9ca3af; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Welcome Back 👋</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign In</button>
        </form>
        <div class="help-text">Don't have an account? <a href="/register/" style="color: #3b82f6;">Register</a></div>
        <a href="/" class="back-link">← Back to Store</a>
    </div>
</body>
</html>
