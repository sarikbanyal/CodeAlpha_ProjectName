<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Success - MyStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #f3f4f6; display: flex; justify-content: center; padding-top: 100px; text-align: center; }
        .box { background: white; padding: 50px; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); max-width: 500px; width: 100%; }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #10b981; margin-bottom: 15px; font-size: 2.2rem; font-weight: 700; }
        p { font-size: 1.1rem; color: #4b5563; margin-bottom: 30px; }
        a.btn { display: inline-block; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 14px 30px; text-decoration: none; border-radius: 30px; font-weight: 600; transition: all 0.3s ease; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        a.btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); }
        .order-link { display: block; margin-top: 20px; color: #6b7280; text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .order-link:hover { color: #10b981; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">🎉</div>
        <h1>Order Successful!</h1>
        <p>Thank you for your purchase. Your amazing items will be shipped soon.</p>
        <a href="/" class="btn">Continue Shopping</a>
        <a href="/orders/" class="order-link">View your order history →</a>
    </div>
</body>
</html>
