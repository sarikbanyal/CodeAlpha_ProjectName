<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Profile - MyStore</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 40px; color: #333; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; background: #3498db; color: white; border: none; padding: 12px; font-size: 1.1rem; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #2980b9; }
        a { color: #3498db; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .stat-box { display: inline-block; background: #ecf0f1; padding: 10px 20px; border-radius: 5px; margin-bottom: 20px; font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/">← Back to Store</a>
        <h1>{{ user.username }}'s Profile</h1>
        
        <div class="stat-box">Username: @{{ user.username }}</div>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Contact Phone Number</label>
                <input type="text" name="phone" value="{{ profile.phone|default:'' }}" placeholder="e.g. 555-1234-5678">
            </div>
            <div class="form-group">
                <label>Default Shipping Address</label>
                <textarea name="address" rows="4" placeholder="Enter your full shipping address here...">{{ profile.address|default:'' }}</textarea>
            </div>
            <button type="submit">Save Profile Updates</button>
        </form>
    </div>
</body>
</html>
