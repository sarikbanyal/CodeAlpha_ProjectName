<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} - MyStore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f4f9; color: #333; padding: 40px; }
        .detail-container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 20px; color: #2c3e50; }
        .price { font-size: 2rem; color: #27ae60; font-weight: bold; margin-bottom: 30px; }
        .description { font-size: 1.2rem; color: #7f8c8d; margin-bottom: 40px; line-height: 1.6; }
        form button { background-color: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        form button:hover { background-color: #2980b9; }
        a.back-link { display: inline-block; margin-top: 30px; color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="detail-container">
        <h1>{{ product.name }}</h1>
        <p class="price">${{ product.price }}</p>
        <p class="description">This is a fantastic product that you will absolutely love. High quality and great value!</p>
        
        <form action="/add-to-cart/{{ product.id }}/" method="POST">
            {% csrf_token %}
            <button type="submit">Add to Cart</button>
        </form>
        
        <a href="/" class="back-link">← Back to Store</a>
    </div>

</body>
</html>
